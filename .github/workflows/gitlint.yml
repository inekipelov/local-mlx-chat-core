name: gitlint

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  workflow_dispatch:

jobs:
  commit-messages:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gitlint
        run: python -m pip install --upgrade pip gitlint

      - name: Determine commit range
        id: range
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "range=${PR_BASE_SHA}..${PR_HEAD_SHA}" >> "$GITHUB_OUTPUT"
          else
            git fetch origin "$DEFAULT_BRANCH" --depth=1
            BASE_SHA="$(git merge-base HEAD "origin/${DEFAULT_BRANCH}")"
            echo "range=${BASE_SHA}..HEAD" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint commit messages
        run: gitlint --commits "${{ steps.range.outputs.range }}"
